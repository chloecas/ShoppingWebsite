<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="styles/baseStyle.css" rel="stylesheet" type="text/css">
    <link href="styles/shoppingStyle.css" rel="stylesheet" type="text/css">
    <link href="styles/loginStyle.css" rel="stylesheet" type="text/css">
</head>
<body>
    <header></header>
    <nav></nav>
    <div id="container">
        <form>
        <fieldset id="fs-login">
            <h1>Login</h1>
            <label for="username">Username</label>
            <input type="text" id="user" name="user">
            <br><br>
            <label for="password">Password</label>
            <input type="password" id="pass" name="pass">
            <br><br>
            <button id="btn-login" onclick="logIn()">Login</button>
            <br><br>
        </fieldset>
        </form id="signUpForm">
        <fieldset id="fs-register">
            <h1> Register </h1>
            <label for="username">Username</label>
            <input type="text" id="user" name="user">
            <br><br>
            <label for="fname">First Name</label>
            <input type="text" id="fname" name="fname">
            <br><br>
            <label for="lname">Last Name</label>
            <input type="text" id="lname" name="lname">
            <br><br>
            <label for="email">Email</label>
            <input type="text" id="email" name="email">
            <br><br>
            <label for="password">Password</label>
            <input type="password" id="pass" name="pass">
            <br><br>
            <label for="address">Address</label>
            <input type="address" id="address" name="address">
            <br><br>
            <label for="phone">Phone Number</label>
            <input type="phone" id="phone" name="phone">
            <br><br>
            <button id="btn-register" onclick="logIn()">Register</button>
            <br><br>
        </fieldset>

        <form>

        </form>
    </div>
    
</body>
</html>
