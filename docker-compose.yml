version: "3.8"

services:

  web:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backup:
    image: postgres:15
    volumes:
      - ./backups:/backups
      - ./backup.sh:/backup.sh
    environment:
      - PGPASSWORD=${DB_PASSWORD}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
    entrypoint: sh /backup.sh
    depends_on:
      - db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  db_data:
